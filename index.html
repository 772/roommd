<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>RoomMD</title>
        <style>
            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>
    </head>
    <body>
        <button id="load" style="float: left">Load</button>
        <textarea
            id="input"
            style="
                min-height: 900px;
                max-height: 900px;
                width: 800px;
                float: left;
            "
        >
# 2

Wire between kitchen lamp and Hauptschalter.

# L

Deckenlampe in der Küche.

# D

Door between kitchen and living room.

# Raum 1

+----+
|1234|
|5678|
|90ab|
+--2-+
+----++---++----++---+
|    ||   ||    ||   |
|    ||   ||    ||   |
|    ||   ||    ||   |
+----++---++----++---+
+-D--+
| D  |
| D  |
|    |
+----+

# Room 2

+----+
|    |
|    |
|    |
+----+
+----++---++----++---+
|  2 ||1 1||    ||   |
|  1 || 1 ||    ||F  |
| D  || 11||x   ||F  |
+----++---++----++---+
+----+
|    |
|    |
|    |
+----+</textarea
        >
        <script type="module">
            import init from "./building-diagram-md.js";
            init().catch((error) => {
                if (
                    !error.message.startsWith(
                        "Using exceptions for control flow, don't mind me. This isn't actually an error!",
                    )
                ) {
                    throw error;
                }
            });
            document.getElementById("load").addEventListener("click", () => {
                const input = document.getElementById("input").value;
                if (input) {
                    window.location.search = `?input=${encodeURIComponent(input)}`;
                }
            });

            // Überprüfe ob ein URL-Parameter vorhanden ist und fülle die Textarea
            const params = new URLSearchParams(window.location.search);
            if (params.has("input")) {
                document.getElementById("input").value = decodeURIComponent(
                    params.get("input"),
                );
            }
        </script>
    </body>
</html>
